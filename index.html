<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>P4re Volume</title>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    background:linear-gradient(to bottom,#313930,#666257);
    font-family:'Patrick Hand',cursive;
}

/* Grain */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);
    background-size:3px 3px;
    opacity:.45;
    pointer-events:none;
}

/* Particles */
.particles{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
}

.particles span{
    position:absolute;
    background:white;
    border-radius:50%;
    opacity:.9;
    box-shadow:0 0 8px rgba(255,255,255,.8);
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(-120vh);
    }
    to{
        transform:translateY(120vh);
    }
}

/* Main Content */
.hero{
    position:relative;
    z-index:10;
    text-align:center;
    width:100%;
}

.hero h1{
    color:#aebbb7;
    font-size:105px;
    font-weight:400;
}

.hero h2{
    color:#bcc4be;
    font-size:46px;
    font-weight:400;
    margin:40px 0 70px;
}

.button-container{
    display:flex;
    justify-content:center;
    gap:50px;
    flex-wrap:wrap;
}

.menu-btn{
    width:340px;
    height:140px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    background:#fff;
    color:#111;
    font-size:75px;
    border-radius:22px;
    transition:.25s;
    box-shadow:0 15px 30px rgba(0,0,0,.18);
}

.menu-btn:hover{
    transform:translateY(-6px);
    box-shadow:0 22px 40px rgba(0,0,0,.28);
}

@media(max-width:900px){

.hero h1{
    font-size:70px;
}

.hero h2{
    font-size:34px;
}

.button-container{
    flex-direction:column;
    align-items:center;
}

.menu-btn{
    width:300px;
    height:120px;
    font-size:60px;
}

}
</style>

</head>
<body>

<div class="particles"></div>

<div class="hero">

    <h1>P4re Volume</h1>

    <h2>Best Seller</h2>

    <div class="button-container">

        <!-- CHANGE THESE LINKS -->
        <a href="https://yourbodylink.com" class="menu-btn">
            Body
        </a>

        <a href="https://yourhairlink.com" class="menu-btn">
            Hair
        </a>

    </div>

</div>

<script>
// Create particles
const particles = document.querySelector(".particles");

for(let i = 0; i < 220; i++){

    const p = document.createElement("span");

    const size = Math.random() * 6 + 2;

    p.style.width = size + "px";
    p.style.height = size + "px";

    p.style.left = Math.random() * 100 + "%";
    p.style.top = Math.random() * 100 + "%";

    p.style.animationDuration = (12 + Math.random() * 18) + "s";
    p.style.animationDelay = (-Math.random() * 30) + "s";

    particles.appendChild(p);
}
</script>

</body>
</html>
